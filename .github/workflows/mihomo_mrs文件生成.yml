name: mihomo_mrs文件生成

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master branch (仅 mihomo 目录)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          sparse-checkout: mihomo
          sparse-checkout-cone-mode: false

      - name: Install mihomo
        run: |
          wget https://github.com/MetaCubeX/mihomo/releases/download/v1.19.17/mihomo-linux-amd64-v1.19.17.gz
          gunzip mihomo-linux-amd64-v1.19.17.gz
          mv mihomo-linux-amd64-v1.19.17 mihomo
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo

      - name: Convert all yaml to mrs
        run: |
          # 2. 检查是否有 yaml 文件
          FILES=$(find mihomo -type f -name "*.yaml")
          if [ -z "$FILES" ]; then
            echo "错误: 在 mihomo 目录中未找到任何 .yaml 文件"
            ls -R mihomo
            exit 1
          fi

          # 3. 开始转换（移除 2>/dev/null 暴露错误）
          echo "$FILES" | while read -r FILE; do
            OUTPUT="${FILE%.yaml}.mrs"
            echo "正在转换: $FILE -> $OUTPUT"
            
            # 尝试作为 domain 转换，失败则尝试 ipcidr
            if ! mihomo convert-ruleset domain yaml "$FILE" "$OUTPUT"; then
              echo "$FILE 不是 domain 格式，尝试 ipcidr..."
              if ! mihomo convert-ruleset ipcidr yaml "$FILE" "$OUTPUT"; then
                echo "警告: $FILE 转换完全失败"
                rm -f "$OUTPUT" # 删除可能产生的空文件
              fi
            fi
          done

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          
          # 检查文件是否真的存在
          ls -lh mihomo/*.mrs || echo "依旧没有生成 mrs 文件"
          
          git add mihomo/*.mrs
          if git diff --staged --quiet; then
            echo "没有检测到文件变化，跳过提交"
          else
            git commit -m "Auto convert Mihomo rules"
            git push origin master
          fi
